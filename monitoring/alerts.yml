groups:
  - name: ton-tracker
    rules:
      - alert: TonTrackerBackendDown
        expr: up{job="ton-tracker-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Backend metrics target is unavailable
      - alert: TonTrackerDatabaseNotReady
        expr: ton_tracker_database_ready == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: SQLite readiness check is failing
      - alert: TonTrackerElevatedServerErrors
        expr: sum(rate(ton_tracker_http_requests_total{status=~"5.."}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Sustained backend 5xx responses detected
